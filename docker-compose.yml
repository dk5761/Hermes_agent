services:
  hermes:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes
    restart: unless-stopped
    ports:
      # Hermes container's network namespace also hosts the gateway (see
      # gateway.network_mode below) — both ports are mapped here.
      - "127.0.0.1:9119:9119"
      - "0.0.0.0:8080:8080"
    volumes:
      - ./data/hermes-home:/opt/data
      # Gateway writes uploaded images to /app/data/blobs/... in *its*
      # container then sends that absolute path to Hermes via image.attach.
      # Hermes lives in a separate filesystem namespace, so we bind the same
      # host directory at the same path inside Hermes' container — read-only
      # is sufficient (Hermes only needs to load the bytes for the model).
      - ./backend/data/blobs:/app/data/blobs:ro
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      # Required to enable the JSON-RPC /api/ws endpoint (off by default).
      HERMES_DASHBOARD_TUI: "1"
    command:
      - dashboard
      - --host
      - 0.0.0.0
      - --port
      - "9119"
      - --no-open
      - --insecure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:9119/api/status\",timeout=3).status==200 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Sidecar that runs Hermes' cron scheduler / messaging gateway. The
  # `hermes dashboard` process serves the API + slash workers, but cron
  # jobs ONLY fire when this `hermes gateway` daemon is running. Without
  # it, jobs sit at their next_run_at timestamp forever and "Run now"
  # taps from the app are no-ops. Shares Hermes' filesystem namespace
  # (same volume) so it sees the same `/opt/data/cron/jobs.json`.
  hermes-cron:
    image: hermes-agent:local
    container_name: hermes-cron
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    volumes:
      - ./data/hermes-home:/opt/data
      - ./backend/data/blobs:/app/data/blobs:ro
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
    command:
      - gateway
      - run

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hermes-mobile-gateway:dev
    container_name: gateway
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    # Share Hermes' network namespace so WS connections to Hermes appear
    # as loopback (Hermes' /api/ws hard-rejects non-loopback clients).
    # Side effect: gateway has no ports of its own — they're declared on
    # the hermes service above.
    network_mode: "service:hermes"
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: /app/data/gateway.db
      HERMES_LAUNCH_MODE: external
      HERMES_BASE_URL: http://127.0.0.1:9119
      HERMES_TOKEN: ""
      HERMES_HOME: /data/hermes-home
      STORAGE_LOCAL_ROOT: /app/data/blobs
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    volumes:
      # Bind specific paths only — keeps host's .git, .env, node_modules,
      # and data/ from leaking into the container. Update this list if you
      # add new top-level config files.
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      # Persist gateway DB + blobs across container restarts.
      - ./backend/data:/app/data
      # Read-only access to Hermes home so the cron-output watcher works.
      - ./data/hermes-home:/data/hermes-home:ro
      # Named volume preserves the container's linux-built better-sqlite3.
      # If you rm this volume, run `docker compose run --rm gateway pnpm install`.
      - gateway_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  gateway_node_modules:
