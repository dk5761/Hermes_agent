services:
  hermes:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes
    restart: unless-stopped
    expose:
      - "9119"
    ports:
      # Exposed to the host loopback only so you can poke /api/status from
      # the Mac for debugging. The gateway reaches Hermes via the compose
      # network at http://hermes:9119, NOT this port.
      - "127.0.0.1:9119:9119"
    volumes:
      - ./data/hermes-home:/opt/data
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
    command:
      - dashboard
      - --host
      - 0.0.0.0
      - --port
      - "9119"
      - --no-open
      - --insecure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9119/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hermes-mobile-gateway:dev
    container_name: gateway
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    ports:
      # Bound to all interfaces so your phone on the LAN can reach the
      # Mac's IP at :8080. If you only want simulator access, change to
      # 127.0.0.1:8080:8080.
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Compose-internal networking. Overrides .env values to make the
      # container reach Hermes via the compose service name, not localhost.
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: /app/data/gateway.db
      HERMES_LAUNCH_MODE: external
      HERMES_BASE_URL: http://hermes:9119
      HERMES_TOKEN: ""
      HERMES_HOME: /data/hermes-home
      STORAGE_LOCAL_ROOT: /app/data/blobs
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    volumes:
      # Bind specific paths only — keeps host's .git, .env, node_modules,
      # and data/ from leaking into the container. Update this list if you
      # add new top-level config files.
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      # Persist gateway DB + blobs across container restarts.
      - ./backend/data:/app/data
      # Read-only access to Hermes home so the cron-output watcher works.
      - ./data/hermes-home:/data/hermes-home:ro
      # Named volume preserves the container's linux-built better-sqlite3.
      # If you rm this volume, run `docker compose run --rm gateway pnpm install`.
      - gateway_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  gateway_node_modules:
